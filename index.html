<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vibe Climb Racing</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#87CEEB; font-family:'Segoe UI',sans-serif; }
  #game { display:block; touch-action:none; }
  #hud { position:fixed; top:0; left:0; right:0; pointer-events:none; z-index:10; }
  .badge { display:inline-flex; align-items:center; gap:6px; background:rgba(0,0,0,.55); color:#fff; border-radius:12px; padding:8px 16px; margin:10px; font-size:18px; font-weight:bold; backdrop-filter:blur(4px); }
  #fuel-badge .icon { width:18px; height:14px; background:#ff5e3a; border-radius:3px; display:inline-block; }
  #fuel-bar-bg { width:90px; height:14px; background:#333; border-radius:7px; overflow:hidden; }
  #fuel-bar-fill { display:block; height:100%; background:#ff5e3a; transition:width .2s; }
  #levelup { position:fixed; top:28%; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.82); color:#ffd700; font-size:30px; font-weight:bold; padding:18px 36px; border-radius:16px; z-index:15; opacity:0; pointer-events:none; text-align:center; white-space:nowrap; }
  #levelup.show { animation: levelup-pop 2.2s ease forwards; }
  @keyframes levelup-pop { 0%{opacity:0;transform:translateX(-50%) scale(.5);} 12%{opacity:1;transform:translateX(-50%) scale(1.15);} 20%{transform:translateX(-50%) scale(1);} 82%{opacity:1;} 100%{opacity:0;transform:translateX(-50%) scale(1);} }
  #controls { position:fixed; bottom:0; left:0; right:0; width:100%; display:flex; justify-content:space-between; pointer-events:none; z-index:10; height:200px; align-items:flex-end; }
  .pedal { pointer-events:auto; width:130px; height:130px; margin:0 20px 25px; border:none; border-radius:50%; font-size:48px; font-weight:bold; color:#fff; backdrop-filter:blur(4px); user-select:none; cursor:pointer; touch-action:none; transition:transform .06s; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(0,0,0,.3); }
  .pedal:active { transform:scale(.88); }
  #btn-brake { background:linear-gradient(135deg,#ff5e3a,#d73a49); }
  #btn-gas { background:linear-gradient(135deg,#34d058,#28a745); }
  .pedal svg { width:52px; height:52px; }

  #version-tag { position:fixed; bottom:4px; left:50%; transform:translateX(-50%); font-size:11px; color:rgba(255,255,255,.4); pointer-events:none; z-index:25; font-family:'Segoe UI',sans-serif; text-shadow:0 1px 3px rgba(0,0,0,.8); }

  /* Overlay screens (shared) */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.78); display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:20; color:#fff; text-align:center; }
  .overlay.hide { display:none; }
  .overlay h1 { font-size:48px; margin-bottom:8px; }
  .overlay h2 { font-size:28px; margin-bottom:16px; color:#ffd700; }
  .overlay p { font-size:20px; margin-bottom:24px; opacity:.85; max-width:420px; line-height:1.4; }
  .overlay button { background:#28a745; border:none; color:#fff; font-size:22px; font-weight:bold; padding:16px 48px; border-radius:14px; cursor:pointer; margin:6px; }
  .overlay button:active { transform:scale(.95); }
  .overlay button.secondary { background:#2d6a9f; }
  .overlay button.danger { background:#d73a49; }
  .overlay input { font-size:22px; padding:14px 20px; border-radius:12px; border:2px solid #2d6a9f; background:#222; color:#fff; text-align:center; margin-bottom:16px; width:300px; max-width:80vw; }
  .overlay input:focus { border-color:#34d058; outline:none; }

  #profile-canvas { border-radius: 12px; margin: 12px 0 16px; box-shadow: 0 4px 16px rgba(0,0,0,.4); background:rgba(0,0,0,.35); }
  #profile-stats { font-size:15px; line-height:1.8; opacity:.9; max-width:460px; }
  #profile-stats .row { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; }
  #profile-stats .stat { white-space:nowrap; }

  /* Garage */
  .upgrade-card { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:16px 24px; margin:8px 0; width:380px; max-width:90vw; display:flex; align-items:center; justify-content:space-between; }
  .upgrade-card .info { text-align:left; }
  .upgrade-card .info .name { font-size:20px; font-weight:bold; color:#fff; }
  .upgrade-card .info .desc { font-size:14px; opacity:.7; }
  .upgrade-card .info .bars { font-size:16px; color:#ffd700; margin-top:4px; }
  .upgrade-card .buy { background:#28a745; border:none; color:#fff; font-size:16px; font-weight:bold; padding:10px 18px; border-radius:10px; cursor:pointer; white-space:nowrap; }
  .upgrade-card .buy:disabled { background:#555; opacity:.5; cursor:default; }
  .upgrade-card .buy.maxed { background:#d35400; }
  #garage-coins { font-size:26px; color:#ffd700; font-weight:bold; margin-bottom:16px; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <span class="badge">🚗 <span id="dist">0</span> m</span>
  <span class="badge">🪙 <span id="coins">0</span></span>
  <span class="badge" id="fuel-badge"><span id="fuel-bar-bg"><span id="fuel-bar-fill" style="width:100%"></span></span></span>
  <span class="badge" id="level-badge">⭐ Lvl <span id="level">1</span></span>
  <span class="badge" id="mute-badge" style="cursor:pointer;pointer-events:auto;">🔊</span>
</div>

<div id="levelup"></div>

<div id="controls">
  <button class="pedal" id="btn-brake" aria-label="Bremse/Rückwärts">
    <svg viewBox="0 0 64 64" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 48 L20 20 Q20 14 26 14 L38 14 Q44 14 44 20 L44 48" />
      <path d="M20 48 L44 48" />
      <path d="M28 22 L28 40 M36 22 L36 40" stroke-width="2.5" opacity=".6"/>
    </svg>
  </button>
  <button class="pedal" id="btn-gas" aria-label="Gas">
    <svg viewBox="0 0 64 64" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 48 L20 20 Q20 14 26 14 L38 14 Q44 14 44 20 L44 48" />
      <path d="M20 48 L44 48" />
      <path d="M26 24 L38 24 M26 30 L38 30 M26 36 L38 36" stroke-width="2.5" opacity=".6"/>
    </svg>
  </button>
</div>

<div id="version-tag"></div>

<!-- Name Input -->
<div id="nameinput" class="overlay">
  <h1>🏁 Vibe Climb Racing</h1>
  <p>Wie heißt du, Fahrer?</p>
  <input id="name-field" type="text" placeholder="Dein Name" maxlength="16" autofocus>
  <button id="name-btn">LOS GEHT'S</button>
</div>

<!-- Start Screen -->
<div id="start" class="overlay hide">
  <h1>🏁 Vibe Climb Racing</h1>
  <p>Willkommen, <b id="player-name">Fahrer</b>!<br>Kontostand: 🪙 <b id="wallet-coins">0</b><br>Bestleistung: <b id="best-dist">0</b> m · Lvl <b id="best-level">1</b></p>
  <button id="garage-btn" class="secondary">🔧 GARAGE</button>
  <button id="start-btn">🏁 START</button>
</div>

<!-- Garage -->
<div id="garage" class="overlay hide">
  <h1>🔧 Garage</h1>
  <div id="garage-coins">🪙 0</div>
  <div id="upgrade-list"></div>
  <button id="garage-back" class="secondary" style="margin-top:16px;">⬅ ZURÜCK</button>
</div>

<!-- Game Over -->
<div id="gameover" class="overlay hide">
  <h1>💥 Game Over</h1>
  <canvas id="profile-canvas"></canvas>
  <div id="profile-stats"></div>
  <button id="restart-btn">NOCHMAL</button>
  <button id="menu-btn" class="secondary">📋 MENÜ</button>
</div>

<script src="game.js"></script>
</body>
</html>
